<!-- index.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="loading.css">
  <title>My First three.js</title>
</head>
<body>
  <div id="loading-screen" role="status" aria-live="polite" aria-label="コンテンツを読み込んでいます">
    <div class="loading-container">
      <div class="loading-text">now loading</div>
      <div class="progress-bar" aria-hidden="true">
        <div class="progress"></div>
        <img class="note" src="./images/lloading.svg" alt="">
      </div>
      <div class="loading-percentage">0%</div>
    </div>
  </div>

  <!-- ここに three.js が自動で <canvas> を作る -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.176.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.176.0/examples/jsm/"
      }
    }
  </script>
  <script src="./loading.js"></script>
  <script type="module" src="./mezzo.js"></script>
</body>
</html>
